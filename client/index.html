<!DOCTYPE html>
<html lang="pt-MZ">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />

    <!-- SEO básico -->
    <meta name="description" content="IDENTICAL - Streetwear moçambicano autêntico. Descubra coleções urbanas que valorizam a cultura das ruas. Be Different, Be Classic." />
    <meta name="keywords" content="IDENTICAL, streetwear, moçambique, roupa urbana, moda africana, Maputo" />
    <meta name="author" content="IDENTICAL" />
    <meta name="theme-color" content="#000000" />

    <!-- Open Graph (WhatsApp, Facebook, LinkedIn) -->
    <meta property="og:title" content="IDENTICAL — Be Different, Be Classic" />
    <meta property="og:description" content="Streetwear moçambicano autêntico. Coleções urbanas que valorizam a cultura das ruas." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://identical-store-production.up.railway.app" />
    <meta property="og:image" content="https://identical-store-production.up.railway.app/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="IDENTICAL Streetwear" />
    <meta property="og:locale" content="pt_MZ" />
    <meta property="og:site_name" content="IDENTICAL" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="IDENTICAL — Be Different, Be Classic" />
    <meta name="twitter:description" content="Streetwear moçambicano autêntico. Coleções urbanas que valorizam a cultura das ruas." />
    <meta name="twitter:image" content="https://identical-store-production.up.railway.app/og-image.png" />

    <!-- Favicon - IDENTICAL brand icon -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700;800;900&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Theme initialization -->
    <script>
      (function() {
        try {
          var savedTheme = localStorage.getItem('identical-theme');
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          if (savedTheme === 'dark' || (!savedTheme && prefersDark)) {
            document.documentElement.classList.add('dark');
          } else {
            document.documentElement.classList.remove('dark');
          }
        } catch (e) {}
      })();
    </script>
    <title>IDENTICAL — Be Different, Be Classic</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
